spring.application.name=duenio

server.port=8090

spring.datasource.url=jdbc:mysql://localhost:3306/pet_duenios
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

eureka.client.eureka-server-http-client-name=RestClient

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

management.endpoints.web.exposure.include=health,info

management.info.env.enabled=true

info.app.name=microservicio de duenios
info.app.description=Modulo para el manejo de duenios
info.app.version=1.0.0